services:
  postgres:
    image: postgres:16
    container_name: designos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: designos_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Prisma / Nest backend expects DATABASE_URL; host is the postgres service name.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb?schema=public
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/shell/Dockerfile
    container_name: designos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:

